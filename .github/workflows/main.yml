name: Generate Datas

on:
  schedule: 
    # execute every 12 hours at minute 0
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Grants permissions to the GITHUB_TOKEN to push to the target branch
permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    
    steps:
      # 1. Generate the Snake Animation
      - name: Generate Snake
        uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: Valorz-2
          svg_out_path: dist/github-contribution-grid-snake.svg

      # 2. Push the generated SVG to the 'output' branch
      - name: Push to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
